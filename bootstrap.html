<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5 Community Portal</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <div class="container mt-4">
        <h1 class="text-primary text-center">
            Local Community Event Portal
        </h1>

        <p class="lead text-center">
            Bootstrap 5 Responsive Grid Example
        </p>
    </div>

    <!-- Responsive Grid Layout -->
    <div class="container mt-5">

        <div class="row g-4">

            <!-- Card 1 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 shadow">

                    <div class="card-body">

                        <h3 class="card-title">
                            Music Festival
                        </h3>

                        <p class="card-text">
                            Enjoy live music performances from local artists.
                        </p>

                        <button class="btn btn-primary">
                            Register
                        </button>

                    </div>

                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 shadow">

                    <div class="card-body">

                        <h3 class="card-title">
                            Sports Meet
                        </h3>

                        <p class="card-text">
                            Participate in community sports competitions.
                        </p>

                        <button class="btn btn-success">
                            Register
                        </button>

                    </div>

                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 shadow">

                    <div class="card-body">

                        <h3 class="card-title">
                            Workshop
                        </h3>

                        <p class="card-text">
                            Learn new skills through community workshops.
                        </p>

                        <button class="btn btn-warning">
                            Register
                        </button>

                    </div>

                </div>
            </div>

        </div>

    </div>

    <!-- Bootstrap JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
