<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bootstrap Forms & Buttons</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <!-- Exercise 8.1 -->
    <h2 class="mb-4">Event Registration Form</h2>

    <form>

        <div class="mb-3">
            <label class="form-label">Name</label>

            <input
                type="text"
                class="form-control"
                placeholder="Enter your name">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>

            <input
                type="email"
                class="form-control"
                placeholder="Enter your email">
        </div>

        <div class="input-group mb-3">

            <span class="input-group-text">
                @
            </span>

            <input
                type="text"
                class="form-control"
                placeholder="Username">

        </div>

        <div class="form-check">

            <input
                class="form-check-input"
                type="checkbox">

            <label class="form-check-label">
                Accept Terms & Conditions
            </label>

        </div>

    </form>

    <hr>

    <!-- Exercise 8.2 -->
    <h2 class="mb-4">Login Form (Floating Labels)</h2>

    <form>

        <div class="form-floating mb-3">

            <input
                type="email"
                class="form-control"
                id="email"
                placeholder="Email">

            <label for="email">
                Email Address
            </label>

        </div>

        <div class="form-floating mb-3">

            <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Password">

            <label for="password">
                Password
            </label>

        </div>

    </form>

    <hr>

    <!-- Exercise 9.1 -->
    <h2 class="mb-4">Bootstrap Buttons</h2>

    <button class="btn btn-primary">Primary</button>

    <button class="btn btn-secondary">Secondary</button>

    <button class="btn btn-success">Success</button>

    <button class="btn btn-danger">Danger</button>

    <button class="btn btn-warning">Warning</button>

    <button class="btn btn-info">Info</button>

    <button class="btn btn-dark">Dark</button>

    <hr>

    <button class="btn btn-outline-primary">
        Outline Primary
    </button>

    <button class="btn btn-outline-success">
        Outline Success
    </button>

    <button class="btn btn-outline-danger">
        Outline Danger
    </button>

    <hr>

    <!-- Exercise 9.2 -->
    <h2 class="mb-4">Button Group</h2>

    <div class="btn-group">

        <button class="btn btn-primary">
            Home
        </button>

        <button class="btn btn-success">
            Events
        </button>

        <button class="btn btn-warning">
            Contact
        </button>

    </div>

    <hr>

    <h2 class="mb-4">Toggle Buttons</h2>

    <input
        type="checkbox"
        class="btn-check"
        id="btncheck1">

    <label
        class="btn btn-outline-primary"
        for="btncheck1">
        Toggle Me
    </label>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
