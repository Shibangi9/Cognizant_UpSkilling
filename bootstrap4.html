<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bootstrap Layouts</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">
        Exercise 4.1 - Sidebar Layout
    </h2>

    <div class="row">
        <div class="col-md-3 bg-primary text-white p-3">
            Sidebar
        </div>

        <div class="col-md-9 bg-light p-3">
            Main Content Area
        </div>
    </div>

    <hr>

    <h2 class="text-center mb-4">
        Exercise 4.2 - Four Equal Columns
    </h2>

    <div class="row text-center">
        <div class="col-sm-3 bg-danger text-white p-3">Column 1</div>
        <div class="col-sm-3 bg-success text-white p-3">Column 2</div>
        <div class="col-sm-3 bg-warning p-3">Column 3</div>
        <div class="col-sm-3 bg-info p-3">Column 4</div>
    </div>

    <hr>

    <h2 class="text-center mb-4">
        Exercise 5.1 - Alignment
    </h2>

    <div class="row justify-content-center align-items-center border"
         style="height:200px;">
        <div class="col-4 bg-secondary text-white text-center p-3">
            Centered Content
        </div>
    </div>

    <hr>

    <h2 class="text-center mb-4">
        Exercise 5.2 - Reordering
    </h2>

    <div class="row">
        <div class="col-md-6 order-md-2 bg-primary text-white p-3">
            First on Mobile, Second on Desktop
        </div>

        <div class="col-md-6 order-md-1 bg-success text-white p-3">
            Second on Mobile, First on Desktop
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
