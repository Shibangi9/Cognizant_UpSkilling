<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bootstrap Positioning, Icons & JS Plugins</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="container mt-5">

    <!-- Exercise 16.1 -->
    <h2>Fixed Footer</h2>

    <p>
        Scroll the page and notice the footer stays fixed at the bottom.
    </p>

    <hr>

    <!-- Exercise 16.2 -->
    <h2>Badge Overlay</h2>

    <div class="position-relative d-inline-block">

        <img
            src="https://via.placeholder.com/250"
            class="img-fluid"
            alt="Event">

        <span
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            New
        </span>

    </div>

    <hr>

    <!-- Exercise 17.1 -->
    <h2>Social Media Icons</h2>

    <div class="fs-2">

        <i class="bi bi-facebook me-3"></i>

        <i class="bi bi-instagram me-3"></i>

        <i class="bi bi-twitter-x me-3"></i>

        <i class="bi bi-youtube"></i>

    </div>

    <hr>

    <!-- Exercise 17.2 -->
    <h2>Icon Only Buttons</h2>

    <button class="btn btn-primary">
        <i class="bi bi-house"></i>
    </button>

    <button class="btn btn-success">
        <i class="bi bi-check-circle"></i>
    </button>

    <button class="btn btn-danger">
        <i class="bi bi-trash"></i>
    </button>

    <hr>

    <!-- Exercise 18.1 -->
    <h2>Bootstrap Modal</h2>

    <button
        class="btn btn-primary"
        data-bs-toggle="modal"
        data-bs-target="#eventModal">

        Open Modal

    </button>

    <div
        class="modal fade"
        id="eventModal">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Community Event
                    </h5>

                    <button
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">
                    Registration Successful!
                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">
                        Close
                    </button>

                </div>

            </div>

        </div>

    </div>

    <hr>

    <!-- Exercise 18.2 -->
    <h2>Accordion</h2>

    <div class="accordion" id="eventAccordion">

        <div class="accordion-item">

            <h2 class="accordion-header">

                <button
                    class="accordion-button"
                    data-bs-toggle="collapse"
                    data-bs-target="#collapseOne">

                    Music Festival

                </button>

            </h2>

            <div
                id="collapseOne"
                class="accordion-collapse collapse show">

                <div class="accordion-body">
                    Details about the music festival.
                </div>

            </div>

        </div>

        <div class="accordion-item">

            <h2 class="accordion-header">

                <button
                    class="accordion-button collapsed"
                    data-bs-toggle="collapse"
                    data-bs-target="#collapseTwo">

                    Sports Meet

                </button>

            </h2>

            <div
                id="collapseTwo"
                class="accordion-collapse collapse">

                <div class="accordion-body">
                    Details about the sports meet.
                </div>

            </div>

        </div>

    </div>

</div>

<!-- Fixed Footer -->
<footer
class="position-fixed bottom-0 start-0 w-100 bg-dark text-white text-center p-2">
    Community Portal Footer
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
